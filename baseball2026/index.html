<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>野球成績2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="table-section">
  <h2>勝利ランキング</h2>
  <canvas id="winChart"></canvas>
</div>

<div class="table-section">
  <h2>本塁打ランキング</h2>
  <canvas id="hrChart"></canvas>
</div>

<div class="table-section">
  <h2>チーム内成績</h2>
  <div id="teamTables"></div>
</div>

<div class="table-section">
  <h2>投手成績一覧</h2>
  <div class="table-wrapper">
    <table id="pitchersTable"></table>
  </div>
</div>

<div class="table-section">
  <h2>野手成績一覧</h2>
  <div class="table-wrapper">
    <table id="battersTable"></table>
  </div>
</div>

<div id="lastUpdate" style="margin-top:20px; font-size:14px; color:#555;"></div>
<div id="adminComment" class="admin-comment"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="javascript.js"></script>
</body>
</html>
